# Blueprint: one Web Service serves Vite-built SPA + Express API.
# After first deploy, set OPENAI_API_KEY in the Render dashboard
# (required for AI; Vite inlines it at build time from the environment).
services:
  - type: web
    name: oberlin-community-calendar-ai
    repo: https://github.com/2024frank/Oberlin-Community-Calendar-AI
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: API_ACCESS_TOKEN
        sync: false
