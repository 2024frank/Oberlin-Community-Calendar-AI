# Backend API service on Render (free tier).
# Frontend is deployed separately on Vercel.
#
# After first deploy:
#   1. Set API_ACCESS_TOKEN on this service.
#   2. Update CORS_ORIGINS to your Vercel frontend URL (e.g. https://your-app.vercel.app).
services:
  - type: web
    name: oberlin-community-calendar-api
    repo: https://github.com/2024frank/Oberlin-Community-Calendar-AI
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://oberlin-community-calendar-ai.vercel.app
      - key: API_ACCESS_TOKEN
        sync: false
